services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: promptstudio
      POSTGRES_USER: promptstudio
      POSTGRES_PASSWORD: promptstudio
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promptstudio -d promptstudio"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://promptstudio:promptstudio@db:5432/promptstudio
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  pgdata:
